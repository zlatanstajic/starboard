services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: starboard-app
    container_name: starboard_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-starboard}
      DB_USERNAME: ${DB_USERNAME:-starboard}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: file
      LOG_CHANNEL: stderr
      LOG_LEVEL: error
    volumes:
      - .:/var/www/html
      - app_storage:/var/www/html/storage/app
      - app_logs:/var/www/html/storage/logs
    networks:
      - starboard

  nginx:
    image: nginx:1.27-alpine
    container_name: starboard_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-18000}:80"
    depends_on:
      - app
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html:ro
      - app_storage:/var/www/html/storage/app:ro
    networks:
      - starboard

  mysql:
    image: mysql:8.4
    container_name: starboard_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-starboard}
      MYSQL_USER: ${DB_USERNAME:-starboard}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    ports:
      - "13306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - starboard

volumes:
  mysql_data:
    driver: local
  app_storage:
    driver: local
  app_logs:
    driver: local

networks:
  starboard:
    driver: bridge
